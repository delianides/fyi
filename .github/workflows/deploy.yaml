name: Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'tests/**'
      - 'README.md'

jobs:
  lint:
    # The type of runner that the job will run on
    name: Eslint
    runs-on: 'ubuntu-latest'

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.tool-versions'
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    # The type of runner that the job will run on
    runs-on: 'ubuntu-latest'
    name: Vitest
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.tool-versions'
          cache: npm
      - run: npm ci
      - run: npm run test

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare
    needs: [lint, test]
    # Skip the Cloudflare deploy on the template repo itself, which has no real
    # KV namespace / secrets. Repos created from this template will still deploy.
    if: github.repository != 'upsertco/fyi'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.tool-versions'
          cache: npm
      - run: npm ci
      - name: Deploy
        # NOTE: Deploy requires a real KV namespace id in wrangler.toml. The
        # committed value is a placeholder (00000000000000000000000000000000);
        # create one with `npx wrangler kv namespace create URLS` and paste the
        # returned id, or this step will fail to bind the URLS namespace.
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
